# Top-level configuration
name = "motr-controller"
main = "./worker.mjs"
compatibility_date = "2025-04-14"

[build]
command = "bun install && bun run build"

[observability]
enabled = true

[[d1_databases]]
binding = "CommonDB" # available in your Worker on env.DB
database_name = "motr-global-db"
database_id = "701488b4-de41-4f75-9ca9-b4d37acf621e"

[[d1_databases]]
binding = "ControllerDB" # available in your Worker on env.DB
database_name = "motr-controller-db"
database_id = "fb3229b9-ab48-482c-b914-0e4e86e1a908"

[vars]
SONR_CHAIN_ID = 'sonr-testnet-1'
IPFS_GATEWAY = 'https://ipfs.sonr.land'
SONR_API_URL = 'https://api.sonr.land'
SONR_RPC_URL = 'https://rpc.sonr.land'
SONR_GRPC_URL = 'https://grpc.sonr.land'
MATRIX_SERVER = 'https://bm.chat'
MOTR_MODE = 'controller'

[durable_objects]
bindings = [{name = "VAULT", class_name = "Vault"}]

[[migrations]]
tag = "v1" 
new_classes = ["Vault"]
