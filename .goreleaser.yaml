# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2
project_name: motr
builds:
  - id: motr
    main: ./cmd/vault
    binary: app
    goos:
      - js
    goarch:
      - wasm

release:
  github:
    owner: sonr-io
    name: motr
  name_template: "{{ .Tag }} | {{ .Env.RELEASE_DATE }}"
  draft: false
  replace_existing_draft: true
  replace_existing_artifacts: true
  extra_files:
    - glob: ./README*

announce:
  telegram:
    enabled: true
    chat_id: -1002222617755
