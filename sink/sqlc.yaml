version: "2"
sql:
  - engine: "sqlite"
    queries: "../cmd/controller/query.sql"
    schema: "../cmd/controller/schema.sql"
    gen:
      go:
        emit_interface: true
        emit_json_tags: true
        package: "controller"
        out: "./models/controller"

  - engine: "sqlite"
    queries: "../cmd/resolver/query.sql"
    schema: "../cmd/resolver/schema.sql"
    gen:
      go:
        emit_interface: true
        emit_json_tags: true
        package: "resolver"
        out: "./models/resolver"
