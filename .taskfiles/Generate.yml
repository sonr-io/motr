# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"
silent: true

vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel

tasks:
  gen:
    desc: Generates code
    sources:
      - "x/identity/model"
      - "x/portfolio/model"
      - "x/user/model"
    cmds:
      - defer: rm -rf .task
      - task: gen:templ
      - for: sources
        task: gen:sqlc
        vars:
          PATH: "{{.ITEM}}"

  gen:templ:
    internal: true
    dir: "{{.ROOT_DIR}}"
    sources:
      - "**/*.templ"
    generates:
      - "**/_templ.go"
    cmds:
      - templ generate

  gen:sqlc:
    internal: true
    requires:
      vars: [PATH]
    dir: "{{.ROOT_DIR}}/{{.PATH}}"
    cmds:
      - sqlc generate
