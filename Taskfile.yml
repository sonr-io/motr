#yaml-language-server: $schema=https://json.schemastore.org/taskfile
version: "3"
silent: true
vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel

tasks:
  clean:
    desc: Remove build artifacts
    cmds:
      - task: tidy:vault
      - task: tidy:front
      - go mod tidy
      - rm -rf .task

  start:
    desc: Start the development server
    cmd: tmux new-window -c "#{pane_current_path}" "bunx mprocs"

  deploy:
    desc: Deploy all
    cmds:
      - task: deploy:vault
      - task: deploy:front

  publish:
    desc: Publish all packages
    cmds:
      - make -C packages/cosmes bump
      - make -C packages/shoelace bump
      - make -C packages/cosmes publish
      - make -C packages/shoelace publish
      - make -C signer publish

  build:
    desc: Build all
    cmds:
      - task: build:packages
      - task: build:vault
      - task: build:front

  start:vault:
    desc: Start the vault
    dir: "{{.ROOT_DIR}}/cmd/vault"
    cmd: bun run start

  start:front:
    desc: Start the frontend
    dir: "{{.ROOT_DIR}}/cmd/front"
    cmd: bun run start

  build:vault:
    desc: Build the vault
    dir: "{{.ROOT_DIR}}/cmd/vault"
    cmd: bun run build
    sources:
      - main.go
    generates:
      - build/app.wasm

  build:front:
    desc: Build the frontend
    dir: "{{.ROOT_DIR}}/cmd/front"
    cmd: bun run build
    sources:
      - main.go
    generates:
      - build/app.wasm

  deploy:vault:
    desc: Deploy the vault
    dir: "{{.ROOT_DIR}}/cmd/vault"
    cmds:
      - bun run deploy

  deploy:front:
    desc: Deploy the frontend
    dir: "{{.ROOT_DIR}}/cmd/front"
    cmd: bun run deploy

  build:packages:
    desc: Build all packages
    cmds:
      - make -C packages/cosmes build
      - make -C packages/shoelace build
      - make -C signer build

  gen:proto:
    desc: Generate proto
    cmd: make -C packages/cosmes gen

  gen:templ:
    desc: Generate templ
    cmd: templ generate

  db:sqlc:
    desc: Generate sqlc
    cmd: sqlc generate

  db:migrate:
    desc: Migrate the database
    prompt:
      - Are you sure you want to run this command? This will delete all data in the database.
    cmds:
      - task: migrate:vault
      - task: migrate:common
      - task: gen:sqlc

  migrate:vault:
    internal: true
    desc: Migrate the vault database
    dir: "{{.ROOT_DIR}}/cmd/vault"
    cmd: npm run migrate
    sources:
      - schema.sql
    generates:
      - schema.sql

  migrate:common:
    internal: true
    desc: Migrate the common database
    dir: "{{.ROOT_DIR}}/sink"
    cmd: npm run migrate
    sources:
      - schema.sql
    generates:
      - schema.sql


  tidy:vault:
    desc: Go mod tidy the vault
    internal: true
    dir: "{{.ROOT_DIR}}/cmd/vault"
    cmds:
      - bun run clean
      - rm -rf ./build
      - rm -rf ./dist

  tidy:front:
    desc: Go mod tidy the frontend
    internal: true
    dir: "{{.ROOT_DIR}}/cmd/front"
    cmds:
      - bun run clean
      - rm -rf ./build
      - rm -rf ./dist
