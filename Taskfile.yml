#yaml-language-server: $schema=https://json.schemastore.org/taskfile
version: "3"
silent: true
vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel

tasks:
  compose:up:
    desc: Start the docker-compose stack
    aliases: [up]
    dir: "{{.ROOT_DIR}}/deploy/docker"
    cmds:
      - docker compose up --build

  compose:up:detached:
    desc: Start the docker-compose stack in detached mode
    aliases: [start]
    dir: "{{.ROOT_DIR}}/deploy/docker"
    cmds:
      - docker compose up -d

  compose:down:
    desc: Stop the docker-compose stack
    aliases: [down]
    dir: "{{.ROOT_DIR}}/deploy/docker"
    cmds:
      - docker compose down

  compose:logs:
    desc: Show the docker-compose logs
    aliases: [logs]
    dir: "{{.ROOT_DIR}}/deploy/docker"
    cmds:
      - docker compose logs -f

  start:controller:
    desc: Start the controller
    dir: "{{.ROOT_DIR}}/cmd/controller"
    cmds:
      - bun run start

  start:resolver:
    desc: Start the resolver
    dir: "{{.ROOT_DIR}}/cmd/resolver"
    cmds:
      - bun run start

  build:
    desc: Build all
    cmds:
      - defer: { task: clean }
      - task: build:controller
      - task: build:resolver
      - task: build:signer

  proto:
    desc: Generate proto
    cmds:
      - make -C packages/cosmes gen

  sqlc:
    desc: Generate sqlc
    dir: "{{.ROOT_DIR}}/sink"
    cmds:
      - make gen

  templ:
    desc: Generate templ
    cmds:
      - templ generate

  build:controller:
    desc: Build the controller
    dir: "{{.ROOT_DIR}}/cmd/controller"
    cmds:
      - bun run build
    sources:
      - main.go
    generates:
      - build/app.wasm

  build:resolver:
    desc: Build the resolver
    dir: "{{.ROOT_DIR}}/cmd/resolver"
    cmds:
      - bun run build
    sources:
      - main.go
    generates:
      - build/app.wasm

  build:signer:
    desc: Build and Upload the signer
    dir: "{{.ROOT_DIR}}/signer"
    cmds:
      - earthly +build
      - gum log --level debug "Uploading signer.wasm to r2"
      - rclone copy ./dist/signer.wasm r2:cdn/bin/
    sources:
      - main.go
    generates:
      - dist/signer.wasm

  build:packages:
    desc: Build all packages
    cmds:
      - make -C packages/cosmes build
      - make -C packages/shoelace build
      - make -C packages/vault build

  publish:packages:
    desc: Publish all packages
    cmds:
      - make -C packages/cosmes publish
      - make -C packages/shoelace publish
      - make -C packages/vault publish

  deploy:controller:
    desc: Deploy the controller
    dir: "{{.ROOT_DIR}}/cmd/controller"
    cmds:
      - bun run deploy

  deploy:resolver:
    desc: Deploy the resolver
    dir: "{{.ROOT_DIR}}/cmd/resolver"
    cmds:
      - bun run deploy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./build
      - rm -rf ./dist
      - rm -rf .task
      - task: tidy:controller
      - task: tidy:resolver

  tidy:controller:
    desc: Go mod tidy the controller
    internal: true
    dir: "{{.ROOT_DIR}}/cmd/controller"
    cmds:
      - go mod tidy

  tidy:resolver:
    desc: Go mod tidy the resolver
    internal: true
    dir: "{{.ROOT_DIR}}/cmd/resolver"
    cmds:
      - go mod tidy
