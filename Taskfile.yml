#yaml-language-server: $schema=https://json.schemastore.org/taskfile
version: "3"
silent: true
vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel

tasks:
  clean:
    desc: Remove build artifacts
    cmds:
      - task: tidy:cmd
      - task: tidy:root

  serve:
    desc: Serve the app with air
    cmd: air

  start:
    desc: Start the vault
    dir: "{{.ROOT_DIR}}/cmd"
    cmd: bun run start

  build:
    desc: Build the binary
    dir: "{{.ROOT_DIR}}/cmd"
    cmd: bun run build
    sources:
      - main.go
    generates:
      - build/app.wasm

  deploy:
    desc: Deploy the vault
    dir: "{{.ROOT_DIR}}/cmd"
    cmds:
      - bun run deploy

  tidy:cmd:
    desc: Go mod tidy the cmd
    internal: true
    dir: "{{.ROOT_DIR}}/cmd"
    cmds:
      - bun run clean
      - rm -rf ./build
      - rm -rf ./dist

  tidy:root:
    desc: Go mod tidy the root
    internal: true
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go mod tidy
      - rm -rf .task

  gen:templ:
    desc: Generate templ
    cmds: 
      - templ generate
      - rm -rf .task

  gen:sqlc:
    desc: Generate sqlc
    dir: "{{.ROOT_DIR}}/sink"
    cmd: sqlc generate

  db:migrate:
    desc: Migrate the database
    prompt:
      - Are you sure you want to run this command? This will delete all data in the database.
    cmds:
      - task: migrate:d1
      - task: gen:sqlc

  migrate:d1:
    internal: true
    desc: Migrate the common database
    dir: "{{.ROOT_DIR}}/cmd"
    cmd: npm run migrate
    sources:
      - schema.sql
    generates:
      - schema.sql

