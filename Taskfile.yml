#yaml-language-server: $schema=https://json.schemastore.org/taskfile
version: "3"
silent: true
vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel

tasks:
  default:
    cmd: task $(tv task)

  start:vault:
    desc: Start the vault
    dir: "{{.ROOT_DIR}}/cmd/vault"
    cmd: bun run start

  start:resolver:
    desc: Start the resolver
    dir: "{{.ROOT_DIR}}/cmd/resolver"
    cmd: bun run start

  build:vault:
    desc: Build the vault
    dir: "{{.ROOT_DIR}}/cmd/vault"
    cmd: bun run build
    sources:
      - main.go
    generates:
      - build/app.wasm

  build:resolver:
    desc: Build the resolver
    dir: "{{.ROOT_DIR}}/cmd/resolver"
    cmd: bun run build
    sources:
      - main.go
    generates:
      - build/app.wasm

  deploy:vault:
    desc: Deploy the vault
    dir: "{{.ROOT_DIR}}/cmd/vault"
    cmds:
      - bun run deploy

  deploy:resolver:
    desc: Deploy the resolver
    dir: "{{.ROOT_DIR}}/cmd/resolver"
    cmd: bun run deploy

  build:packages:
    desc: Build all packages
    cmds:
      - make -C packages/cosmes build
      - make -C packages/shoelace build
      - make -C signer build

  bump:packages:
    desc: Bump all packages
    cmds:
      - make -C packages/cosmes bump
      - make -C packages/shoelace bump

  publish:packages:
    desc: Publish all packages
    cmds:
      - make -C packages/cosmes publish
      - make -C packages/shoelace publish
      - make -C signer publish

  gen:proto:
    desc: Generate proto
    cmd: make -C packages/cosmes gen

  gen:sqlc:
    desc: Generate sqlc
    dir: "{{.ROOT_DIR}}"
    cmd: sqlc generate

  gen:templ:
    desc: Generate templ
    cmd: templ generate

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./build
      - rm -rf ./dist
      - rm -rf .task
      - task: tidy:controller
      - task: tidy:resolver

  tidy:controller:
    desc: Go mod tidy the controller
    internal: true
    dir: "{{.ROOT_DIR}}/cmd/controller"
    cmds:
      - go mod tidy

  tidy:resolver:
    desc: Go mod tidy the resolver
    internal: true
    dir: "{{.ROOT_DIR}}/cmd/resolver"
    cmds:
      - go mod tidy
